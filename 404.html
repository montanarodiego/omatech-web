<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>OMA tech</title>
    <!--
      SPA redirect for GitHub Pages (rafgraph/spa-github-pages technique).
      GitHub Pages serves this 404.html for any unknown path (e.g. /pos). We encode the
      requested path into a query string and redirect to the site root, where the snippet
      in index.html restores the real URL so React Router can handle it.
      pathSegmentsToKeep = 0 because the site is served from a root custom domain.
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 0
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      )
    </script>
  </head>
  <body></body>
</html>
